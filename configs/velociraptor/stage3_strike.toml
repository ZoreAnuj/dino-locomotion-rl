[stage]
name = "strike"
description = "Sprint and strike prey with sickle claw"

[env]
forward_vel_weight = 1.0               # Increased from 0.5: encourage sprinting toward prey, not creeping
forward_vel_max = 3.0                  # Match stage 2: without this, default 10.0 drops effective forward signal ~13x (agent may forget locomotion)
backward_vel_penalty_weight = 0.0
alive_bonus = 0.0                      # Zeroed: survival is learned in stages 1-2; any per-step alive reward adds opportunity cost that discourages episode-terminating strikes
fall_penalty = -10.0                   # Keep moderate: still want to discourage falling, but not so harsh that agent avoids lunging
energy_penalty_weight = 0.001
tail_stability_weight = 0.02
posture_weight = 0.1
nosedive_weight = 0.3                  # Reduced from stage2 (0.7): more aggressive lean acceptable during sprinting
gait_symmetry_weight = 0.0             # Disabled: don't constrain lunge maneuvers
smoothness_weight = 0.02
heading_weight = 0.3                   # Match stage 2: face toward prey for strike
lateral_penalty_weight = 0.1           # Match stage 2: penalize crab-walking toward prey
strike_bonus = 1000.0                  # Must greatly exceed discounted future per-step value (~460 at gamma=0.995 over 500 steps); makes striking immediately net-positive
strike_approach_weight = 3.0           # Delta-based gradient toward prey; goes to ~0 at prey so doesn't reward hovering
strike_proximity_weight = 0.0          # Zeroed: continuous proximity bonus rewarded hovering near prey without striking; with strike_bonus=1000 the agent should strike on arrival, not linger
strike_claw_proximity_weight = 1.0     # Reduced from 2.0: still provides final aiming gradient for claw-to-prey positioning, but lower weight reduces incentive to hover with claw near prey
prey_distance_range = [2.0, 6.0]       # Tightened from [3.0, 8.0]: closer prey makes strike discovery much more likely during exploration
prey_lateral_range = [-1.5, 1.5]
max_episode_steps = 1000

[ppo]
learning_rate = 5e-5
learning_rate_end = 1e-5
n_steps = 4096
batch_size = 256
n_epochs = 10
gamma = 0.995
gae_lambda = 0.95
clip_range = 0.15                      # Widened from 0.1: allow larger policy updates to escape local optimum (survival-only behavior)
ent_coef = 0.005                       # 5x increase from 0.001: more exploration needed to discover sparse strike reward

[ppo.policy_kwargs]
net_arch = [512, 256]

[sac]
learning_rate = 1e-4              # Higher than PPO's 5e-5 — replay buffer stabilizes updates; faster convergence on sparse reward
batch_size = 256
gamma = 0.99                     # Critical: at gamma=0.99 discounted future ≈ 250 (vs 459 at 0.995),
                                 # so strike_bonus=1000 is 4x the opportunity cost — the strike-avoidance
                                 # problem that plagued PPO is structurally weaker here
tau = 0.005
ent_coef = "auto"                # Auto-entropy is especially valuable for sparse rewards — maintains
                                 # exploration without the manual tuning PPO required (ent_coef=0.005)
buffer_size = 1_000_000          # Large buffer retains locomotion transitions from Stage 2
learning_starts = 10_000
train_freq = 16                  # Collect 16 env steps before training — amortises gradient cost over more env steps
gradient_steps = 8               # 2:1 data-to-update ratio — more gradient updates per env batch smooths learning curves

[sac.policy_kwargs]
net_arch = [512, 256]

[curriculum]
timesteps = 8000000
min_avg_reward = 100.0
min_success_rate = 0.5                  # At least 25% strike success — confirms hunting behavior emerged
required_consecutive = 3
warmup_timesteps = 300000               # Increased from 100k: Stage 3 introduces new reward components, critic needs more adaptation time
warmup_clip_range = 0.02                # Small clip range during warm-up to limit policy change
warmup_ent_coef = 0.02                  # Higher entropy during warm-up to maintain exploration
ramp_timesteps = 500000                 # Timesteps over which to linearly ramp forward_vel_weight
ramp_start_value = 0.1                  # Starting fraction of forward_vel_weight during ramp
