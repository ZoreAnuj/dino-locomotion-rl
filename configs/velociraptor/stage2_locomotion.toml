[stage]
name = "locomotion"
description = "Learn forward walking/running"

[env]
forward_vel_weight = 2.0                # With forward_vel_max=3.0 gives max reward 2.0; at 1.3 m/s (current avg) reward = 0.87/step
                                        # Still provides meaningful gradient without saturating at walking speeds
forward_vel_max = 3.0                   # Increased from 1.5: agent plateaued at 1.3 m/s (87% of old max), needs headroom to push past waddle
backward_vel_penalty_weight = 0.0       # Redundant: forward_vel_weight already penalizes backward motion (forward_vel_norm goes negative)
alive_bonus = 0.5                       # Reduce from 2.0: was 99% of total reward, drowning forward signal
fall_penalty = -50.0                    # Reduce from -100: less punitive with lower alive_bonus
energy_penalty_weight = 0.003
tail_stability_weight = 0.05
posture_weight = 0.2                    # Reduced from 0.8: successful runs used 0.0-0.2; high values trap agent in standing posture
nosedive_weight = 0.3                   # Reduced from 1.0: allows forward lean for gait initiation while preventing face-plants
gait_symmetry_weight = 0.0              # Disabled for sweep: let forward_vel dominate; re-enable post-sweep if gait quality matters
smoothness_weight = 0.05
strike_bonus = 0.0
strike_approach_weight = 0.0
heading_weight = 0.3
lateral_penalty_weight = 0.1
prey_distance_range = [8.0, 12.0]
max_episode_steps = 1000

[ppo]
learning_rate = 5e-5
learning_rate_end = 1e-5
n_steps = 4096
batch_size = 256
n_epochs = 10
gamma = 0.995
gae_lambda = 0.95
clip_range = 0.2
ent_coef = 0.005

[ppo.policy_kwargs]
net_arch = [512, 256]

[sac]
learning_rate = 1e-4              # 3x reduction from Stage 1 (vs PPO's 6x) — replay buffer provides more stable gradients, less LR reduction needed
batch_size = 256
gamma = 0.99                     # Keep at 0.99, not 0.995 — off-policy replay staleness amplifies bootstrapping error at high gamma
tau = 0.005
ent_coef = "auto"                # Auto-entropy naturally decreases exploration as locomotion is learned
buffer_size = 1_000_000          # Larger buffer retains Stage 1 balance transitions, reducing catastrophic forgetting
learning_starts = 10_000
train_freq = 16                  # Collect 16 env steps before training — amortises gradient cost over more env steps
gradient_steps = 8               # 2:1 data-to-update ratio — more gradient updates per env batch smooths learning curves

[sac.policy_kwargs]
net_arch = [512, 256]

[curriculum]
timesteps = 8000000
min_avg_reward = 100.0
min_avg_episode_length = 750
min_avg_forward_vel = 2.0
required_consecutive = 3
warmup_timesteps = 300000               # Increase from 100k: give critic more time to adapt to new reward landscape
warmup_clip_range = 0.02
warmup_ent_coef = 0.02
ramp_timesteps = 2000000               # Increase from 500k: much slower ramp prevents reward-chasing collapse
ramp_start_value = 0.2                  # Increase from 0.1: start with detectable forward signal
