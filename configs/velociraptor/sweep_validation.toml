# Validation configurations for Stage 1 (balance) — top 3 sweep results
# plus a manually tuned anti-rotation variant.
#
# Select one by setting VALIDATION_SETTING = 1..4 in the training notebook.
# Set to None to skip the override and use the default stage1_balance.toml.
#
# | Setting | Source             | Best Reward | Ep Length | Key Traits                          |
# |---------|--------------------|-------------|-----------|-------------------------------------|
# | 1       | Sweep Trial 20     | 4516.53     | 972       | Highest reward, perfectly stable    |
# | 2       | Sweep Trial 9      | 4383.09     | 1000      | Max episode length, very stable     |
# | 3       | Sweep Trial 21     | 4380.45     | 1000      | Lowest LR, max episode length       |
# | 4       | Manual (anti-rot.) | TBD         | TBD       | Reduced alive bonus, heading/spin   |

# --- Setting 1: Trial 20 — Highest reward (4516.53), perfectly stable ---

[setting_1.env]
alive_bonus = 4.7751150971653455
backward_vel_penalty_weight = 0.5
drift_penalty_weight = 0.0
spin_penalty_weight = 0.0
energy_penalty_weight = 0.023098437233377095
forward_vel_weight = 0.0
gait_symmetry_weight = 0.0
nosedive_weight = 2.1421201217594983
posture_weight = 1.2638516073204769
smoothness_weight = 0.05
strike_bonus = 0.0
strike_approach_weight = 0.0
tail_stability_weight = 0.02
prey_distance_range = [10.0, 15.0]
max_episode_steps = 1000
reset_noise_scale = 0.05

[setting_1.ppo]
learning_rate = 4.8822421551019516e-05
n_steps = 1024
batch_size = 128
n_epochs = 10
gamma = 0.9882306956920238
gae_lambda = 0.95
clip_range = 0.2
ent_coef = 0.0014883260316447084

[setting_1.ppo.policy_kwargs]
net_arch = [512, 256]

[setting_1.sac]
learning_rate = 3e-4
batch_size = 256
gamma = 0.9882306956920238
tau = 0.005
ent_coef = "auto"
buffer_size = 300_000
learning_starts = 10_000
train_freq = 16
gradient_steps = 8

[setting_1.sac.policy_kwargs]
net_arch = [512, 256]

