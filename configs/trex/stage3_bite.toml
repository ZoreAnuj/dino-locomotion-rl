[stage]
name = "bite"
description = "Sprint and bite prey with jaws"

[env]
forward_vel_weight = 0.5               # Halved from 1.0: prevent forward reward from dominating approach/bite signals
alive_bonus = 0.0                      # Zeroed: survival is learned in stages 1-2; any per-step alive reward adds opportunity cost that discourages episode-terminating bites
fall_penalty = -10.0                   # Proportional to reduced alive_bonus (0.05); default -100 is 2000x alive_bonus, making agent overly conservative about approaching prey
energy_penalty_weight = 0.001
tail_stability_weight = 0.02
posture_weight = 0.1
nosedive_weight = 0.2
gait_symmetry_weight = 0.0             # Disabled: formula rewards asymmetry, not alternation (same as stage 1/2)
smoothness_weight = 0.02
heading_weight = 0.5                   # Match stage 2: face toward prey for bite
lateral_penalty_weight = 0.3           # Match stage 2: penalize crab-walking toward prey
bite_bonus = 1000.0                    # Must greatly exceed discounted future per-step value; makes biting immediately net-positive (matches raptor strike_bonus)
bite_approach_weight = 3.0             # 3x increase from 1.0: stronger delta-based gradient toward prey
bite_head_proximity_weight = 1.0       # Head-to-prey proximity shaping: provides final aiming gradient for head positioning near prey
prey_distance_range = [2.0, 6.0]       # Tightened from [3.0, 8.0]: closer prey makes bite discovery much more likely during exploration
prey_lateral_range = [-1.5, 1.5]
max_episode_steps = 1000

[ppo]
learning_rate = 5e-5
learning_rate_end = 1e-5
n_steps = 4096
batch_size = 256
n_epochs = 10
gamma = 0.995
gae_lambda = 0.95
clip_range = 0.15                      # Widened from 0.1: allow larger policy updates to escape local optimum (survival-only behavior)
ent_coef = 0.005                       # 5x increase from 0.001: more exploration needed to discover sparse bite reward

[ppo.policy_kwargs]
net_arch = [512, 256]

[sac]
learning_rate = 1e-4              # Higher than PPO's 5e-5 — replay buffer stabilizes updates; faster convergence on sparse bite reward
batch_size = 256
gamma = 0.99                     # At gamma=0.99, discounted future ≈ 250 vs bite_bonus=1000 — biting is clearly net-positive;
                                 # PPO's gamma=0.995 made future value ~460, closer to the bonus threshold
tau = 0.005
ent_coef = "auto"                # Auto-entropy handles sparse reward exploration — T-Rex's 96.7% PPO success rate
                                 # suggests the task structure is sound; SAC should solve it more sample-efficiently
buffer_size = 1_000_000          # Large buffer retains locomotion transitions from Stage 2
learning_starts = 10_000
train_freq = 4                   # Batch env steps before training — 4× less Python loop overhead
gradient_steps = 4               # Match train_freq to maintain update-to-data ratio

[sac.policy_kwargs]
net_arch = [512, 256]            # Standard width — Stage 3 task (approach + bite) is lower-dimensional than locomotion

[curriculum]
timesteps = 8000000
min_avg_reward = 100.0
min_success_rate = 0.5                # At least 25% bite success — confirms hunting behavior emerged
required_consecutive = 3
warmup_timesteps = 100000               # Timesteps to constrain policy updates while critic adapts (PPO only)
warmup_clip_range = 0.02                # Small clip range during warm-up to limit policy change
warmup_ent_coef = 0.02                  # Higher entropy during warm-up to maintain exploration
ramp_timesteps = 500000                 # Timesteps over which to linearly ramp forward_vel_weight
ramp_start_value = 0.1                  # Starting fraction of forward_vel_weight during ramp
