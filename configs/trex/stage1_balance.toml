[stage]
name = "balance"
description = "Learn to stand and balance without falling"

[env]
forward_vel_weight = 0.0
backward_vel_penalty_weight = 0.0              # Redundant with drift_penalty — drift covers all horizontal directions equally
drift_penalty_weight = 0.3                     # Penalize horizontal displacement from spawn; prevents hop-to-balance exploit
spin_penalty_weight = 0.1                      # Penalize pelvis angular velocity to directly discourage spinning
speed_penalty_weight = 0.3                     # Penalize absolute 2D speed above threshold — complements drift penalty with instantaneous signal
speed_penalty_threshold = 0.10                 # m/s — any speed above this incurs penalty
alive_bonus = 2.0
energy_penalty_weight = 0.05
tail_stability_weight = 0.15
posture_weight = 2.0
nosedive_weight = 3.0
smoothness_weight = 0.1
heading_weight = 0.1                  # Small heading reward to prevent spin-to-balance exploits
gait_symmetry_weight = 0.0     # Disable: default formula rewards single-foot stance, bad for balance
height_weight = 1.0            # Reward maintaining pelvis height near target (0.90m)
fall_penalty = -50.0           # Reduce from -100 to lower gradient variance
bite_bonus = 0.0
bite_approach_weight = 0.0
prey_distance_range = [10.0, 15.0]
max_episode_steps = 1000                  # Match stage 2/3 for consistent episode horizon across curriculum
reset_noise_scale = 0.05                  # Increased from 0.01 default to improve robustness (matches raptor)

[ppo]
learning_rate = 3e-4
learning_rate_end = 1e-5
n_steps = 4096
batch_size = 128
n_epochs = 10
gamma = 0.998
gae_lambda = 0.95
clip_range = 0.2
ent_coef = 0.005

[ppo.policy_kwargs]
net_arch = [512, 256]

[sac]
learning_rate = 3e-4              # Match PPO starting LR — SAC tolerates higher LR due to replay buffer stability
batch_size = 256                  # Larger than PPO's 128 for T-Rex — SAC benefits from bigger batches with replay buffer
gamma = 0.99                     # Lower than PPO's 0.998 — off-policy replay staleness at high gamma causes value overestimation;
                                 # 0.99 is sufficient for balance (PPO needed 0.998 due to on-policy variance, not task structure)
tau = 0.005
ent_coef = "auto"                # Auto-tuned entropy — replaces PPO's manual ent_coef=0.005
buffer_size = 300_000            # Sufficient for 6M-step Stage 1; smaller buffer keeps transitions recent
learning_starts = 10_000         # Collect 10K random transitions before gradient updates begin
train_freq = 4                   # Batch env steps before training — 4× less Python loop overhead
gradient_steps = 4               # Match train_freq to maintain update-to-data ratio

[sac.policy_kwargs]
net_arch = [512, 256]            # Match PPO architecture; T-Rex's 83 obs dims handled by input layer, not hidden width

[curriculum]
timesteps = 6000000
min_avg_reward = 100.0
min_avg_episode_length = 750
required_consecutive = 3
