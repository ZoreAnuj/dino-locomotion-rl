# Validation configurations for Stage 1 (balance) — candidates for
# hyperparameter sweep validation.
#
# Select one by setting VALIDATION_SETTING = 1..4 in the training notebook.
# Set to None to skip the override and use the default stage1_balance.toml.
#
# | Setting | Source             | Best Reward | Ep Length | Key Traits                          |
# |---------|--------------------|-------------|-----------|-------------------------------------|
# | 1       | Baseline (TOML)    | TBD         | TBD       | Default stage1_balance.toml values  |
# | 2       | Anti-rotation      | TBD         | TBD       | Stronger gait stability penalties   |
# | 3       | High alive bonus   | TBD         | TBD       | Boosted alive bonus, tuned energy   |
# | 4       | Raptor S4 port     | TBD         | TBD       | Velociraptor setting 4 (anti-rot.)  |

# --- Setting 1: Baseline — default stage1_balance.toml values ---

[setting_1.env]
alive_bonus = 1.0
energy_penalty_weight = 0.0005
forward_vel_weight = 0.0
gait_stability_weight = 0.1
speed_penalty_weight = 0.3
speed_penalty_threshold = 0.10
food_reach_bonus = 0.0
food_approach_weight = 0.0
food_head_proximity_weight = 0.0
food_distance_range = [10.0, 15.0]
food_height_range = [2.0, 3.0]
max_episode_steps = 1000

[setting_1.ppo]
learning_rate = 3e-4
n_steps = 2048
batch_size = 64
n_epochs = 10
gamma = 0.99
gae_lambda = 0.95
clip_range = 0.2
ent_coef = 0.01

[setting_1.ppo.policy_kwargs]
net_arch = [256, 256]

[setting_1.sac]
learning_rate = 3e-4
batch_size = 256
gamma = 0.99
tau = 0.005
ent_coef = "auto"
buffer_size = 300_000
learning_starts = 10_000
train_freq = 4
gradient_steps = 4

[setting_1.sac.policy_kwargs]
net_arch = [256, 256]

