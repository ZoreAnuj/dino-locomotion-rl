[stage]
name = "balance"
description = "Learn to stand on four legs without falling"

[env]
forward_vel_weight = 0.0
backward_vel_penalty_weight = 0.0
drift_penalty_weight = 0.0
spin_penalty_weight = 0.0
speed_penalty_weight = 0.3                     # Penalize absolute 2D speed above threshold — complements gait stability with instantaneous signal
speed_penalty_threshold = 0.10                 # m/s — any speed above this incurs penalty
alive_bonus = 2.0
energy_penalty_weight = 0.0005
gait_stability_weight = 0.1
gait_symmetry_weight = 0.0                     # Disabled: balance stage doesn't need alternation
smoothness_weight = 0.0
tail_stability_weight = 0.0
posture_weight = 0.0
nosedive_weight = 0.3
height_weight = 0.0
heading_weight = 0.0
lateral_penalty_weight = 0.0
food_reach_bonus = 0.0
food_approach_weight = 0.0
food_head_proximity_weight = 0.0
food_distance_range = [10.0, 15.0]
food_height_range = [2.0, 3.0]
max_episode_steps = 1000                  # Match stage 2/3 for consistent episode horizon across curriculum
reset_noise_scale = 0.05                  # Increased from 0.01 default to improve robustness (matches raptor/trex)

[ppo]
learning_rate = 3e-4
learning_rate_end = 1e-5
n_steps = 2048
batch_size = 64
n_epochs = 10
gamma = 0.99
gae_lambda = 0.95
clip_range = 0.2
ent_coef = 0.01

[ppo.policy_kwargs]
net_arch = [512, 256]

[sac]
learning_rate = 3e-4              # Match PPO starting LR — SAC tolerates this well with replay buffer
batch_size = 256                  # Larger than PPO's 64 for Brachiosaurus — SAC benefits from bigger batches;
                                 # PPO needed small batches for on-policy variance, SAC does not
gamma = 0.99                     # Match PPO — appropriate for balance task horizon
tau = 0.005
ent_coef = "auto"                # Replaces PPO's manual ent_coef=0.01 (highest among species);
                                 # auto-tuning should discover appropriate exploration for quadruped stability
buffer_size = 300_000            # Sufficient for 6M-step Stage 1
learning_starts = 10_000
train_freq = 4                   # Batch env steps before training — 4× less Python loop overhead
gradient_steps = 4               # Match train_freq to maintain update-to-data ratio

[sac.policy_kwargs]
net_arch = [512, 256]            # Match PPO architecture

[curriculum]
timesteps = 6000000
min_avg_reward = 100.0
min_avg_episode_length = 750
required_consecutive = 3
