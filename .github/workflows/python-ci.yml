name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "configs/**"
      - "pyproject.toml"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "environments/**"
      - "configs/**"
      - "pyproject.toml"
      - ".github/workflows/python-ci.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install ruff mypy gymnasium numpy

      - name: Ruff lint
        run: ruff check environments/

      - name: Ruff format check
        run: ruff format --check environments/

      - name: mypy
        run: mypy environments/ --ignore-missing-imports

  test-shared:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install OSMesa
        run: sudo apt-get update && sudo apt-get install -y libosmesa6-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests with coverage
        run: pytest environments/shared/tests/ -v --tb=short --cov=environments/shared --cov-report=term-missing
        env:
          MUJOCO_GL: osmesa

  test-velociraptor:
